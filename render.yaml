# Render blueprint — one web service + a managed Postgres database.
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
services:
  - type: web
    name: avenueos
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: avenueos-db
          property: connectionString
      - key: APP_PASSWORD
        sync: false # set your login password in the Render dashboard
      - key: AUTH_SECRET
        generateValue: true # random session secret
      - key: NODE_ENV
        value: production

databases:
  - name: avenueos-db
    plan: basic-256mb
    databaseName: avenueos
